services:
  db:
    image: mariadb:10.6.10
    environment:
      TZ: UTC
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_USER: ${MYSQL_USER:-railsuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-railspass}
      MYSQL_DATABASE: '${DATABASE_NAME:-verbena}_development'
      DATABASE_NAME: '${DATABASE_NAME:-verbena}'
    ports:
      - '${MYSQL_FORWARD_PORT:-23306}:3306'
    volumes:
      - 'mysql-data:/var/lib/mysql'
      - ./initdb/mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -u root -p"$$MYSQL_ROOT_PASSWORD"']
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    environment:
      DATABASE_ADAPTER: mysql2
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      VERBENA_DATABASE_USER: ${VERBENA_DATABASE_USER:-${MYSQL_USER:-railsuser}}
      VERBENA_DATABASE_PASSWORD: ${VERBENA_DATABASE_PASSWORD:-${MYSQL_PASSWORD:-railspass}}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql-data:
