service: verbena

image: <%= ENV.fetch('DEPLOY_IMAGE') %>

servers:
  web:
    hosts:
      - <%= ENV.fetch('DEPLOY_SERVER_WEB_HOST') %>
    options:
      hostname: <%= ENV.fetch('DEPLOY_WEB_HOSTNAME', 'verbena-web') %>
    proxy: false
    cmd: "bundle exec rails server"
  worker:
    hosts:
      - <%= ENV.fetch('DEPLOY_SERVER_WORKER_HOST') %>
    options:
      hostname: <%= ENV.fetch('DEPLOY_WORKER_HOSTNAME', 'verbena-worker') %>
    proxy: false
    cmd: "bundle exec bin/jobs"

registry:
  server: localhost:5555

builder:
  arch: amd64

env:
  clear:
    RAILS_ENV: staging
    DATABASE_ADAPTER: mysql2
    DATABASE_HOST: verbena-mysql
    DATABASE_PORT: "3306"
    DATABASE_NAME: <%= ENV.fetch('DATABASE_NAME', 'verbena') %>
    VERBENA_DATABASE_USER: <%= ENV.fetch('VERBENA_DATABASE_USER', 'railsuser') %>

    # Delivery settings
    VERBENA_DELIVERY_METHOD: <%= ENV.fetch('VERBENA_DELIVERY_METHOD', '').to_s.inspect %>
    VERBENA_DELIVERY_SMTP_ADDRESS: <%= ENV.fetch('VERBENA_DELIVERY_SMTP_ADDRESS', '').to_s.inspect %>
    VERBENA_DELIVERY_SMTP_PORT: <%= ENV.fetch('VERBENA_DELIVERY_SMTP_PORT', '').to_s.inspect %>
    VERBENA_DELIVERY_SMTP_DOMAIN: <%= ENV.fetch('VERBENA_DELIVERY_SMTP_DOMAIN', '').to_s.inspect %>
    VERBENA_DELIVERY_SMTP_USER_NAME: <%= ENV.fetch('VERBENA_DELIVERY_SMTP_USER_NAME', '').to_s.inspect %>
    VERBENA_DELIVERY_SMTP_AUTHENTICATION: <%= ENV.fetch('VERBENA_DELIVERY_SMTP_AUTHENTICATION', '').to_s.inspect %>
    VERBENA_DELIVERY_SMTP_ENABLE_STARTTLS_AUTO: <%= ENV.fetch('VERBENA_DELIVERY_SMTP_ENABLE_STARTTLS_AUTO', '').to_s.inspect %>
    VERBENA_DELIVERY_MAX_RETRIES: <%= ENV.fetch('VERBENA_DELIVERY_MAX_RETRIES', '').to_s.inspect %>
    VERBENA_DELIVERY_LOCK_TTL_SECONDS: <%= ENV.fetch('VERBENA_DELIVERY_LOCK_TTL_SECONDS', '').to_s.inspect %>
    VERBENA_DELIVERY_LOCK_MAX_SECONDS: <%= ENV.fetch('VERBENA_DELIVERY_LOCK_MAX_SECONDS', '').to_s.inspect %>
    VERBENA_ENVELOPE_FROM_OVERRIDE: <%= ENV.fetch('VERBENA_ENVELOPE_FROM_OVERRIDE', '').to_s.inspect %>
    VERBENA_FILE_DELIVERY_DIR: <%= ENV.fetch('VERBENA_FILE_DELIVERY_DIR', '').to_s.inspect %>

    # API settings
    VERBENA_API_PAGINATION_DEFAULT_LIMIT: <%= ENV.fetch('VERBENA_API_PAGINATION_DEFAULT_LIMIT', '').to_s.inspect %>
    VERBENA_API_PAGINATION_LIMIT_CAP: <%= ENV.fetch('VERBENA_API_PAGINATION_LIMIT_CAP', '').to_s.inspect %>
    VERBENA_API_PAGINATION_DEFAULT_OFFSET: <%= ENV.fetch('VERBENA_API_PAGINATION_DEFAULT_OFFSET', '').to_s.inspect %>
    VERBENA_API_RESPONSES_DEFAULT_LIMIT: <%= ENV.fetch('VERBENA_API_RESPONSES_DEFAULT_LIMIT', '').to_s.inspect %>
    VERBENA_API_RESPONSES_LIMIT_CAP: <%= ENV.fetch('VERBENA_API_RESPONSES_LIMIT_CAP', '').to_s.inspect %>

    # Maintenance and system settings
    VERBENA_EML_MAX_BYTES: <%= ENV.fetch('VERBENA_EML_MAX_BYTES', '').to_s.inspect %>
    VERBENA_CLEANUP_TTL_DAYS: <%= ENV.fetch('VERBENA_CLEANUP_TTL_DAYS', '').to_s.inspect %>
    VERBENA_LOG_FORMAT: <%= ENV.fetch('VERBENA_LOG_FORMAT', '').to_s.inspect %>
    VERBENA_ADMIN_USERNAME: <%= ENV.fetch('VERBENA_ADMIN_USERNAME', '').to_s.inspect %>
  secret:
    - SECRET_KEY_BASE
    - VERBENA_DATABASE_PASSWORD
    - VERBENA_DELIVERY_SMTP_PASSWORD
    - VERBENA_ADMIN_PASSWORD

ssh:
  port: <%= ENV.fetch('DEPLOY_SSH_PORT', 22) %>
  user: <%= ENV.fetch('DEPLOY_SSH_USER') %>
  keys_only: true
  keys:
<% ENV.fetch('DEPLOY_SSH_KEYS').split(',').each do |key| %>
    - <%= key.strip %>
<% end %>

accessories:
  mysql:
    image: mariadb:10.6.10
    host: <%= ENV.fetch('DEPLOY_ACCESSORIES_DB_HOST') %>
    env:
      clear:
        TZ: UTC
        DATABASE_ENVS: staging
        DATABASE_NAME: <%= ENV.fetch('DATABASE_NAME', 'verbena') %>
        MYSQL_DATABASE: <%= ENV.fetch('DATABASE_NAME', 'verbena') %>_staging
        MYSQL_USER: <%= ENV.fetch('VERBENA_DATABASE_USER', 'railsuser') %>
      secret:
        - MYSQL_ROOT_PASSWORD
        - MYSQL_PASSWORD
    directories:
      - mysql-data:/var/lib/mysql
    files:
      - initdb/mysql/00-create-db-users.sh:/docker-entrypoint-initdb.d/00-create-db-users.sh
