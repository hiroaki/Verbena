service: verbena

image: <%= ENV.fetch('DEPLOY_IMAGE') %>

servers:
  web:
    hosts:
      - <%= ENV.fetch('DEPLOY_SERVER_WEB_HOST') %>
    options:
      hostname: <%= ENV.fetch('DEPLOY_WEB_HOSTNAME', 'verbena-web') %>
    proxy: false
    cmd: "bundle exec rails server"
  worker:
    hosts:
      - <%= ENV.fetch('DEPLOY_SERVER_WORKER_HOST') %>
    options:
      hostname: <%= ENV.fetch('DEPLOY_WORKER_HOSTNAME', 'verbena-worker') %>
    proxy: false
    cmd: "bundle exec bin/jobs"

registry:
  server: localhost:5555

builder:
  arch: amd64

env:
  clear:
    RAILS_ENV: staging
    DATABASE_ADAPTER: mysql2
    DATABASE_HOST: mysql
    DATABASE_PORT: "3306"
    DATABASE_NAME: <%= ENV.fetch('DATABASE_NAME', 'verbena') %>
    VERBENA_DATABASE_USER: <%= ENV.fetch('VERBENA_DATABASE_USER', 'verbena') %>

    # Delivery settings
    VERBENA_DELIVERY_METHOD: <%= ENV['VERBENA_DELIVERY_METHOD'] %>
    VERBENA_DELIVERY_SMTP_ADDRESS: <%= ENV['VERBENA_DELIVERY_SMTP_ADDRESS'] %>
    VERBENA_DELIVERY_SMTP_PORT: <%= ENV['VERBENA_DELIVERY_SMTP_PORT'] %>
    VERBENA_DELIVERY_SMTP_DOMAIN: <%= ENV['VERBENA_DELIVERY_SMTP_DOMAIN'] %>
    VERBENA_DELIVERY_SMTP_USER_NAME: <%= ENV['VERBENA_DELIVERY_SMTP_USER_NAME'] %>
    VERBENA_DELIVERY_SMTP_AUTHENTICATION: <%= ENV['VERBENA_DELIVERY_SMTP_AUTHENTICATION'] %>
    VERBENA_DELIVERY_SMTP_ENABLE_STARTTLS_AUTO: <%= ENV['VERBENA_DELIVERY_SMTP_ENABLE_STARTTLS_AUTO'] %>
    VERBENA_ENVELOPE_FROM_OVERRIDE: <%= ENV['VERBENA_ENVELOPE_FROM_OVERRIDE'] %>
    VERBENA_FILE_DELIVERY_DIR: <%= ENV['VERBENA_FILE_DELIVERY_DIR'] %>
    VERBENA_DELIVERY_MAX_RETRIES: <%= ENV['VERBENA_DELIVERY_MAX_RETRIES'] %>
    VERBENA_DELIVERY_LOCK_TTL_SECONDS: <%= ENV['VERBENA_DELIVERY_LOCK_TTL_SECONDS'] %>
    VERBENA_DELIVERY_LOCK_MAX_SECONDS: <%= ENV['VERBENA_DELIVERY_LOCK_MAX_SECONDS'] %>

    # API settings
    VERBENA_API_PAGINATION_DEFAULT_LIMIT: <%= ENV['VERBENA_API_PAGINATION_DEFAULT_LIMIT'] %>
    VERBENA_API_PAGINATION_LIMIT_CAP: <%= ENV['VERBENA_API_PAGINATION_LIMIT_CAP'] %>
    VERBENA_API_PAGINATION_DEFAULT_OFFSET: <%= ENV['VERBENA_API_PAGINATION_DEFAULT_OFFSET'] %>
    VERBENA_API_RESPONSES_DEFAULT_LIMIT: <%= ENV['VERBENA_API_RESPONSES_DEFAULT_LIMIT'] %>
    VERBENA_API_RESPONSES_LIMIT_CAP: <%= ENV['VERBENA_API_RESPONSES_LIMIT_CAP'] %>

    # Maintenance and system settings
    VERBENA_EML_MAX_BYTES: <%= ENV['VERBENA_EML_MAX_BYTES'] %>
    VERBENA_CLEANUP_TTL_DAYS: <%= ENV['VERBENA_CLEANUP_TTL_DAYS'] %>
    VERBENA_LOG_FORMAT: <%= ENV['VERBENA_LOG_FORMAT'] %>
    VERBENA_ADMIN_USERNAME: <%= ENV['VERBENA_ADMIN_USERNAME'] %>
  secret:
    - SECRET_KEY_BASE
    - VERBENA_DATABASE_PASSWORD
    - VERBENA_DELIVERY_SMTP_PASSWORD
    - VERBENA_ADMIN_PASSWORD

ssh:
  port: <%= ENV.fetch('DEPLOY_SSH_PORT', 22) %>
  user: <%= ENV.fetch('DEPLOY_SSH_USER') %>
  keys_only: true
  keys:
<% ENV.fetch('DEPLOY_SSH_KEYS').split(',').each do |key| %>
    - <%= key.strip %>
<% end %>

accessories:
  mysql:
    image: mariadb:10.6.10
    host: <%= ENV.fetch('DEPLOY_ACCESSORIES_DB_HOST') %>
    env:
      clear:
        TZ: UTC
        DATABASE_ENVS: staging
        DATABASE_NAME: <%= ENV.fetch('DATABASE_NAME', 'verbena') %>
        MYSQL_DATABASE: <%= ENV.fetch('DATABASE_NAME', 'verbena') %>_staging
        MYSQL_USER: <%= ENV.fetch('VERBENA_DATABASE_USER', 'verbena') %>
      secret:
        - MYSQL_ROOT_PASSWORD
        - MYSQL_PASSWORD
    directories:
      - mysql-data:/var/lib/mysql
    files:
      - initdb/mysql/00-create-db-users.sh:/docker-entrypoint-initdb.d/00-create-db-users.sh
