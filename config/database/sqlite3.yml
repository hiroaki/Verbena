<%
  resolve_path = lambda do |env|
    override = ENV["DATABASE_FILE"]
    return override unless override.nil? || override.empty?
    base = ENV["DATABASE_NAME"]
    base = "verbena" if base.nil? || base.empty?
    File.join("storage", "#{base}_#{env}.sqlite3")
  end
%>

default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: <%= ENV.fetch("DATABASE_TIMEOUT") { 5000 } %>

development:
  <<: *default
  database: <%= resolve_path.call("development") %>

test:
  <<: *default
  database: <%= resolve_path.call("test") %>

staging:
  <<: *default
  database: <%= resolve_path.call("staging") %>

production:
  <<: *default
  database: <%= resolve_path.call("production") %>
