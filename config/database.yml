<%
adapter = ENV["DATABASE_ADAPTER"]
raise KeyError, "Set DATABASE_ADAPTER (mysql2, postgresql, sqlite3)" if adapter.nil? || adapter.strip.empty?
adapter = adapter.downcase
config_path = File.expand_path("database/#{adapter}.yml", __dir__)
raise ArgumentError, "Unsupported DATABASE_ADAPTER=#{adapter}" unless File.exist?(config_path)
%>
<%= ERB.new(File.read(config_path)).result %>
